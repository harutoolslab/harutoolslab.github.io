<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<title>PNG圧縮｜無料オンラインで画質を保ったまま軽量化</title>
<meta name="description" content="PNG画像を圧縮してファイルサイズを小さくする無料ツール。画質を保ちながら軽量化できます。スマホ・PC対応。">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: sans-serif;
  text-align: center;
  padding: 20px;
  background: #fafafa;
}

#drop {
  border: 2px dashed #999;
  padding: 40px;
  margin: 20px auto;
  max-width: 320px;
  background: #fff;
}

input, button {
  margin: 10px;
  padding: 10px;
  font-size: 16px;
}

.section {
  max-width: 700px;
  margin: 40px auto;
  text-align: left;
  background: #fff;
  padding: 20px;
  border-radius: 8px;
}

.ad {
  margin: 30px 0;
  padding: 20px;
  background: #eee;
}
</style>
</head>

<body>

<h1>PNG圧縮（無料・オンライン）</h1>

<p>
PNG画像の画質を保ったままファイルサイズを小さくできます。<br>
透過画像にも対応しています。
</p>

<div class="ad">広告</div>

<div id="drop">PNG画像をドラッグ＆ドロップ</div>

<input type="file" id="upload" accept="image/png" multiple><br>

<button onclick="run()">圧縮する</button>

<div id="result"></div>

<div class="ad">広告</div>

<div class="section">
<h2>使い方</h2>
<p>
1. PNG画像を選択<br>
2. 圧縮ボタンを押す<br>
3. ダウンロード
</p>
</div>

<div class="section">
<h2>特徴</h2>
<ul>
<li>PNGのまま圧縮</li>
<li>透過画像対応</li>
<li>無料・インストール不要</li>
<li>ブラウザで安全に処理</li>
</ul>
</div>

<div class="section">
<h2>関連ツール</h2>
<a href="image-compress.html">画像を圧縮する（JPG対応）</a><br>
<a href="jpg-to-png.html">JPGをPNGに変換する</a><br>
<a href="png-to-jpg.html">PNGをJPGに変換する</a><br>
<a href="index.html">トップページ</a>
</div>

<script>
// ===== 共通処理 =====

const drop = document.getElementById("drop");
const upload = document.getElementById("upload");

let files = [];

upload.addEventListener("change", e => {
  files = e.target.files;
});

drop.addEventListener("dragover", e => {
  e.preventDefault();
  drop.style.background = "#eee";
});

drop.addEventListener("dragleave", () => {
  drop.style.background = "#fff";
});

drop.addEventListener("drop", e => {
  e.preventDefault();
  files = e.dataTransfer.files;
  drop.style.background = "#fff";
});

function run(){
  if(files.length === 0){
    alert("ファイルを選択してください");
    return;
  }
  process(files);
}

// ===== ツール処理 =====

function process(files){
  const result = document.getElementById("result");
  result.innerHTML = "圧縮中...";

  for(let file of files){

    const img = new Image();
    img.src = URL.createObjectURL(file);

    img.onload = () => {
      const canvas = document.createElement("canvas");
      canvas.width = img.width;
      canvas.height = img.height;

      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0);

      canvas.toBlob(blob => {
        const url = URL.createObjectURL(blob);

        const a = document.createElement("a");
        a.href = url;
        a.download = file.name;
        a.textContent = a.download;

        result.appendChild(a);
        result.appendChild(document.createElement("br"));

      }, "image/png", 0.8);
    };
  }
}
</script>

</body>
</html>
